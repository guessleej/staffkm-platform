# Prometheus alerting rules（M5 GA）
#
# 套用到 prometheus.yml:
#   rule_files: ['alerts.yml']
groups:
  - name: staffkm-sli
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Service {{ $labels.job }} down ≥ 2 min"

      - alert: HighErrorRate
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            / sum by (job) (rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels: { severity: page }
        annotations:
          summary: "{{ $labels.job }} 5xx 比例 > 5% 持續 5 分鐘"

      - alert: P95LatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le, job) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2.0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.job }} p95 > 2s 持續 10 分鐘"

      - alert: PgVectorSlow
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(staffkm_pgvector_query_ms_bucket[5m]))
          ) > 100
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "pgvector p95 > 100ms 持續 10 分鐘"

      - alert: QuotaBreachSpike
        expr: sum(rate(http_requests_total{status="429"}[5m])) > 0.5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "5 分鐘內 429 速率 > 0.5/s，疑似 quota 設太緊或被攻擊"

      - alert: WorkerStalled
        expr: |
          time() - max(staffkm_trigger_worker_last_scan_ts) > 300
        for: 5m
        labels: { severity: page }
        annotations:
          summary: "trigger_worker 已 5 分鐘未掃描；cron triggers 可能停擺"
