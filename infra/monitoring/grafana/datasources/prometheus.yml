apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: staffkm-prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
    # v3.3 B3：trace exemplar — Prometheus 帶 trace_id label 時 Grafana 可一鍵跳 Tempo
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: staffkm-tempo
