# staffKM Helm values（v2.0 GA 預設）
#
# 上線前必改：
#   - secrets.secretsKey （Fernet 主金鑰）
#   - secrets.jwtSecret  （Gateway JWT 簽章）
#   - postgres.password / superuserPassword
#   - 各 service env.OPENAI_API_KEY 等

image:
  registry: docker.io
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# ── 多副本 + 自動擴展（每個服務獨立） ──────────────────────────────
replicaCount:
  gateway:   2
  agent:     2
  knowledge: 2
  auth:      2
  chat:      2
  ui:        2
  worker:    2   # v4.0 P3+P4: arq workers (worker.enabled=true 才生效)

# v4.0 P3+P4: Distributed worker backend (arq + redis)
# 啟用後 agent service 內部 in-process worker 自動 disable (WORKER_BACKEND=arq)
worker:
  enabled: false   # 預設關 (v3.x in-process 行為)；切到 true 時也要設 agent env

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuThreshold: 70
  memThreshold: 75

resources:
  default:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }
  agent:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "2Gi" }
  knowledge:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "4Gi" }   # pgvector caller 吃較多
  worker:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }

# ── 安全 / 多租戶 ──────────────────────────────────────────────────
secrets:
  # 上線前必填（kubectl create secret 後在這裡寫 secret name 即可）
  secretsKey:   ""           # staffkm-secrets-key
  jwtSecret:    ""           # staffkm-jwt-secret
  ollamaToken:  ""           # 若有

# ── PostgreSQL（建議走 cloud managed；本 chart 提供 in-cluster as fallback） ──
postgres:
  managed: false             # true 時不啟動 in-cluster；走 externalUrl
  externalUrl: ""            # postgresql://user:pwd@host:5432/staffkm
  image: pgvector/pgvector:pg16
  version: "16-alpine"       # v4.0 P5: replica StatefulSet 用
  storageClass: standard
  persistence:
    size: 100Gi
  superuserPassword: ""
  password: ""
  # v4.0 P5: streaming replica（multi-region readiness; active-passive）
  # production 建議改用 patroni / repmgr / managed PG；此 StatefulSet 為 demo
  replica:
    enabled: false           # 預設關
    storage: "20Gi"
    storageClass: ""         # 例: "gp3-encrypted"

# ── 觀測 ──────────────────────────────────────────────────────────
observability:
  enabled: true
  otelCollectorEndpoint: "otel-collector.observability.svc:4317"
  prometheusEnabled: true   # PodMonitor / ServiceMonitor 自動建立

# ── Ingress ────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: staffkm.example.com
  tls:
    enabled: true
    secretName: staffkm-tls

# ── 排程 / Long-running tasks（M4 trigger worker） ─────────────────
triggerWorker:
  enabled: true
  replicaCount: 1          # 多副本待 advisory lock 上鉤後再開
  schedule: "*/1 * * * *"   # 若改用 CronJob 模式
