{{- if .Values.postgres.replica.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres-replica
  labels:
    app.kubernetes.io/name: postgres-replica
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-replica
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-replica
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: "postgres:{{ .Values.postgres.version | default "16-alpine" }}"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-config
                  key: DB_PASSWORD
            - name: POSTGRES_USER
              value: staffkm
            - name: POSTGRES_DB
              value: staffkm
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { name: pgsql, containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.replica.storage | default "20Gi" }}
        {{- with .Values.postgres.replica.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-replica
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres-replica
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: pgsql, port: 5432, targetPort: 5432 }
{{- end }}
