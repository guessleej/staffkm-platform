apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: staffkm
spec:
  replicas: {{ .Values.replicaCount.agent }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8002"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: agent
          image: "{{ .Values.image.registry }}/staffkm/agent:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 8002 }
          envFrom:
            - secretRef: { name: {{ .Release.Name }}-config }
          env:
            - name: STAFFKM_ENV
              value: {{ .Release.Namespace | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otelCollectorEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: staffkm-agent
            - name: STAFFKM_SECRETS_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.secretsKey | default (printf "%s-secrets-key" .Release.Name) }}, key: key } }
          resources: {{ toYaml .Values.resources.agent | nindent 12 }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-agent
spec:
  selector:
    app.kubernetes.io/name: agent
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: 80, targetPort: http }
---
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-agent
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.autoscaling.cpuThreshold }} }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: {{ .Values.autoscaling.memThreshold }} }
{{- end }}
