# 開發環境 Nginx 設定（前端由 vite dev server :5173 提供）
#
# HTTPS（dev 自簽）：先跑 `./infra/nginx/ssl/gen-dev-cert.sh` 產 dev.crt/dev.key，
# 容器把 infra/nginx/ssl 掛到 /etc/nginx/ssl（compose 已掛）。prod 由 Caddy 自動 Let's Encrypt。
upstream staffkm_gateway {
    server gateway:8000;
    keepalive 32;
}

# HTTP（:80）— 保留完整功能（dev 便利 + compose healthcheck 走 HTTP /login，不強制轉址）
server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    # 開發時 API 代理
    location /api/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # 健康檢查
    location /health {
        proxy_pass http://staffkm_gateway/api/v1/health;
        access_log off;
    }

    # 所有其他流量轉發到 Vite Dev Server
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# HTTPS（:443，dev 自簽）— 與 :80 並存（不強制轉址，避免打到 compose 的 HTTP healthcheck）。
# 用途：在 dev 測 HTTPS-only 行為（secure cookie / HSTS / mixed-content / service worker）。
# 先跑 ./infra/nginx/ssl/gen-dev-cert.sh 產 dev.crt/dev.key（已掛 /etc/nginx/ssl）。
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    client_max_body_size 100m;

    ssl_certificate     /etc/nginx/ssl/dev.crt;
    ssl_certificate_key /etc/nginx/ssl/dev.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    # dev 自簽：HSTS max-age 設短（避免日後切回 HTTP 被瀏覽器鎖死）。prod Caddy 用 1 年。
    add_header Strict-Transport-Security "max-age=300" always;

    location /api/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://staffkm_gateway/api/v1/health;
        access_log off;
    }

    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
