# 正式環境 Nginx 設定
upstream staffkm_gateway {
    server gateway:8000;
    keepalive 32;
}

upstream staffkm_ui {
    server ui:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    # 安全標頭
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Gateway ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE 串流
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;

        # 上傳文件
        client_max_body_size 100m;
    }

    # LINE/Teams Webhook（需要快速回應）
    location /api/v1/integrations/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── 前端 UI ──────────────────────────────────────────────────
    location / {
        proxy_pass http://staffkm_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── 健康檢查 ─────────────────────────────────────────────────
    location = /health {
        proxy_pass http://staffkm_gateway/api/v1/health;
        access_log off;
    }

    # Prometheus metrics（僅內部存取）
    location = /metrics {
        proxy_pass http://staffkm_gateway/metrics;
        allow 172.16.0.0/12;
        deny all;
    }
}
