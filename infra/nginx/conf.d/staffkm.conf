# 正式環境 Nginx 設定
upstream staffkm_gateway {
    server gateway:8000;
    keepalive 32;
}

upstream staffkm_ui {
    server ui:80;
    keepalive 8;
}

# ── HTTP：一律導向 HTTPS（secure-context API 需要：crypto.randomUUID / 剪貼簿 / 語音 …）──
# 例外：/health 保留在 80（給不走 TLS 的探針用；compose healthcheck 已改走 https）
server {
    listen 80;
    server_name _;

    location = /health {
        proxy_pass http://staffkm_gateway/api/v1/health;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主站 ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    client_max_body_size 100m;

    ssl_certificate     /etc/nginx/ssl/dev.crt;
    ssl_certificate_key /etc/nginx/ssl/dev.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 安全標頭
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Gateway ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE 串流
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;

        # 上傳文件
        client_max_body_size 100m;
    }

    # LINE/Teams Webhook（需要快速回應）
    location /api/v1/integrations/ {
        proxy_pass http://staffkm_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── 前端 UI ──────────────────────────────────────────────────
    # v2.4-A: widget.js + widget-demo.html — 允許從任何 origin 載入
    location ~ ^/(widget\.js|widget-demo\.html)$ {
        proxy_pass http://staffkm_ui;
        # widget 是 public asset，明確允許 cross-origin
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Frame-Options "" always;   # reset
        add_header Cache-Control "public, max-age=3600";
    }

    # v2.4-A: /share/{appId} 公開分享頁，允許嵌入任何網站
    location ~ ^/share/ {
        proxy_pass http://staffkm_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # 拿掉 X-Frame-Options，改用 CSP frame-ancestors 允許所有
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors *;" always;
    }

    location / {
        proxy_pass http://staffkm_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # ── 健康檢查 ─────────────────────────────────────────────────
    location = /health {
        proxy_pass http://staffkm_gateway/api/v1/health;
        access_log off;
    }

    # Prometheus metrics（僅內部存取）
    location = /metrics {
        proxy_pass http://staffkm_gateway/metrics;
        allow 172.16.0.0/12;
        deny all;
    }
}
