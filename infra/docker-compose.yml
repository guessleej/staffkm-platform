name: staffkm

# ────────────────────────────────────────────────────────────────
#  環境變數 — 複製 .env.example 為 .env 並填寫真實值
# ────────────────────────────────────────────────────────────────
x-db-env: &db-env
  DB_URL: postgresql+asyncpg://${DB_USER:-staffkm}:${DB_PASSWORD:-staffkm_secret}@postgres:5432/${DB_NAME:-staffkm}?ssl=disable
  # v5.12：所有 python service 行程 TZ 釘 UTC。asyncpg 用「行程 TZ」編碼 naive datetime →
  # 若容器 TZ≠UTC（如客戶設 Asia/Taipei 看 log），naive datetime.utcnow() 寫 timestamptz 會偏
  # 8h（觸發時間/API key·trial·驗證 token 到期全錯）。釘 UTC 根治。日誌時間請在前端轉在地時區。
  TZ: UTC

x-redis-env: &redis-env
  REDIS_PASSWORD: ${REDIS_PASSWORD:-staffkm_redis}

# v5.12：API key 加密金鑰（fernet）。**務必在 .env 設定** → 否則 provider/embedding 的 api_key
# 以明文 plain: 存 DB（賣存客戶 LLM key 的系統大忌）。產生：openssl rand -base64 32
x-secrets-env: &secrets-env
  STAFFKM_SECRETS_KEY: ${STAFFKM_SECRETS_KEY:-}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    labels: "service"

# ────────────────────────────────────────────────────────────────
#  共用健康檢查基礎 (FastAPI /health)
# ────────────────────────────────────────────────────────────────
x-api-healthcheck: &api-healthcheck
  test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-8000}/health || exit 1"]
  interval: 20s
  timeout: 5s
  retries: 5
  start_period: 30s

services:

  # ══════════════════════════════════════════════════════════════
  #  基礎設施層
  # ══════════════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    container_name: staffkm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-staffkm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staffkm_secret}
      POSTGRES_DB: ${DB_NAME:-staffkm}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-staffkm} -d ${DB_NAME:-staffkm}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    logging: *default-logging
    networks:
      - backend

  # ── v4.0 P5: PostgreSQL streaming replica（multi-region readiness）──
  # 預設關（profile=multi-region 才起）；demo / dev / staging 用
  # production 建議用 patroni / repmgr / managed PG（RDS Multi-AZ / Cloud SQL HA）
  postgres-replica:
    image: postgres:16-alpine
    container_name: staffkm-postgres-replica
    profiles: ["multi-region"]
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staffkm_secret}
      POSTGRES_USER: staffkm
      POSTGRES_DB: staffkm
      # 簡化：dev/staging 走 logical replication；prod 走 streaming
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica-init.sh:/docker-entrypoint-initdb.d/replica-init.sh:ro
    networks: [backend]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5433:5432"   # host port 不同避免衝突
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: staffkm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-staffkm_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-staffkm_redis}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: staffkm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-staffkm}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-staffkm_minio}
      MINIO_SITE_NAME: staffkm-storage
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend

  # ── v4.0 P7: MinIO secondary（multi-region readiness）──────────
  # 預設關（profile=multi-region）；production 設 mc replicate rule sync
  minio-secondary:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: staffkm-minio-secondary
    profiles: ["multi-region"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-staffkm}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-staffkm_minio}
    volumes:
      - minio_secondary_data:/data
    ports:
      - "9100:9000"   # API
      - "9101:9001"   # console
    networks: [backend]
    logging: *default-logging

  # ══════════════════════════════════════════════════════════════
  #  Ollama — 內網 AI 引擎（地端優先策略，RFC-005）
  #  跑兩個模型：
  #    - snowflake-arctic-embed2  (embedding, ~1.2 GB) — 非中國/Apache-2.0/多語含繁中
  #    - gemma4:e4b   (LLM, ~9.6 GB) ← Google Gemma 4 E4B、4.5B 有效參數、128K context、多模態
  #  ARM64 / x86_64 雙平台原生
  # ══════════════════════════════════════════════════════════════
  embedder:
    image: ollama/ollama:0.24.0
    container_name: staffkm-embedder
    restart: unless-stopped
    volumes:
      - embedder_cache:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      # v5.12：-1 = 模型載入後「永不」idle 卸載（預設 5min 沒用就卸 → 下次呼叫冷啟動慢，
      # gemma4 9.6GB 重載數秒~數十秒）。常駐 → 呼叫即用、不待機。
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_MAX_LOADED_MODELS: "2"   # 同時常駐 embedding + LLM
    healthcheck:
      # v5.12：只檢 embedding 模型在（embedder 核心職責）。LLM 可換（LLM_MODEL），不硬綁 gemma4。
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q arctic-embed || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1800s   # 首次需下載模型（arctic ~1.2GB + LLM；gemma4 ~9.6GB）
    deploy:
      resources:
        limits:
          # ⚠ gemma4:e4b 需 ~10GB RAM 才載得動（embedder 容器需 ≥12g）→ RAM 不足請擴充硬體。
          # （進階：LLM 可接外部 endpoint，見 docs/deploy/production-deploy.md）
          memory: ${EMBEDDER_MEM_LIMIT:-16g}
          cpus: "4.0"
        reservations:
          memory: 6g
    logging: *default-logging
    networks:
      - backend
      - frontend  # 首次拉模型需連 ollama.com

  # 一次性：拉取 arctic embedding + LLM_MODEL（預設 gemma4:e4b；可換小模型）
  embedder-init:
    image: ollama/ollama:0.24.0
    container_name: staffkm-embedder-init
    restart: "no"
    depends_on:
      - embedder
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e   # 任何 pull 失敗都立即退出（避免假 "✅ 就緒" 訊息）
        echo "⏳ 等 Ollama 啟動..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "📦 拉取 snowflake-arctic-embed2 (~1.2 GB) — Embedding 模型（非中國/Apache-2.0/多語含繁中）..."
        ollama pull snowflake-arctic-embed2
        echo "🧠 拉取 LLM: $LLM_MODEL（gemma4:e4b ~9.6GB 需 ≥12g RAM；低 RAM 改設 LLM_MODEL 小模型）..."
        ollama pull "$LLM_MODEL"
        # 確認模型在 list 中（防止 pull 假成功）
        ollama list | grep -q arctic-embed || { echo "❌ snowflake-arctic-embed2 not in list"; exit 1; }
        ollama list | grep -q "$(echo "$LLM_MODEL" | cut -d: -f1)" || { echo "❌ $LLM_MODEL not in list"; exit 1; }
        # v5.12：部署後預熱 — 先把模型載進記憶體（配合 OLLAMA_KEEP_ALIVE=-1 → 永久常駐）→ 呼叫即快。
        echo "🔥 預熱模型（載入記憶體常駐）..."
        ollama run "$LLM_MODEL" "hi" >/dev/null 2>&1 || true
        ollama embed snowflake-arctic-embed2 "warmup" >/dev/null 2>&1 \
          || ollama run snowflake-arctic-embed2 "warmup" >/dev/null 2>&1 || true
        echo "✅ AI 模型就緒並常駐（embedding + LLM，不待機）"
    environment:
      OLLAMA_HOST: "embedder:11434"
      # v5.12：LLM 模型可換（同一變數也餵給 agent 使用）。低 RAM 機改設小模型，如
      # qwen2.5:3b / gemma3:1b / llama3.2:3b（≤4GB）。預設 gemma4:e4b 需 ≥12g RAM。
      LLM_MODEL: ${LLM_MODEL:-gemma4:e4b}
    networks:
      - backend

  # ── v3.4 P3: Cross-encoder reranker（profile opt-in）─────────
  reranker:
    image: staffkm/reranker:${TAG:-latest}
    container_name: staffkm-reranker
    profiles: ["reranker"]
    build:
      context: ..
      dockerfile: services/reranker/Dockerfile
    restart: unless-stopped
    environment:
      MODEL_NAME:   ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      MODEL_DEVICE: ${RERANKER_DEVICE:-cpu}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    ports:
      - "8010:8000"
    volumes:
      - reranker_hf_cache:/home/reranker/.cache/huggingface
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 2G

  # MinIO 初始化：建立預設 bucket
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: staffkm-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-staffkm} ${MINIO_ROOT_PASSWORD:-staffkm_minio} &&
        mc mb --ignore-existing local/staffkm-docs &&
        mc mb --ignore-existing local/staffkm-logs &&
        mc policy set download local/staffkm-docs &&
        echo '✅ MinIO buckets 初始化完成'
      "
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  #  資料庫 Migration（先於所有應用服務啟動）
  # ══════════════════════════════════════════════════════════════

  db-migrate:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
      target: base
    container_name: staffkm-db-migrate
    restart: "no"
    entrypoint: ["sh", "-c"]
    command: ["echo '✅ Schema 由 init.sql 建立，跳過 migration'"]
    environment:
      <<: [*db-env, *secrets-env]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  #  API Gateway
  # ══════════════════════════════════════════════════════════════

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: staffkm/gateway:${TAG:-latest}
    container_name: staffkm-gateway
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENV: production
      SECRET_KEY: ${SECRET_KEY:?請在 .env 設定 SECRET_KEY}
      KNOWLEDGE_SERVICE_URL: http://knowledge:8001
      AGENT_SERVICE_URL: http://agent:8002
      AUTH_SERVICE_URL: http://auth:8003
      INTEGRATION_SERVICE_URL: http://integration:8004
      CHAT_SERVICE_URL: http://chat:8005
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/0
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
    depends_on:
      redis:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      agent:
        condition: service_healthy
      auth:
        condition: service_healthy
      chat:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - frontend
      - backend

  # ══════════════════════════════════════════════════════════════
  #  Knowledge Service（知識庫 + 文件處理）
  # ══════════════════════════════════════════════════════════════

  knowledge:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
    image: staffkm/knowledge:${TAG:-latest}
    container_name: staffkm-knowledge
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      PORT: 8001
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-staffkm}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-staffkm_minio}
      MINIO_BUCKET: staffkm-docs
      MINIO_SECURE: "false"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-64}
      # v5.9.23: OCR 引擎 — tesseract (預設地端) | vision (地端 Ollama vision model)
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      VISION_OCR_MODEL: ${VISION_OCR_MODEL:-llama3.2-vision}
      VISION_OCR_BASE_URL: ${VISION_OCR_BASE_URL:-http://embedder:11434/v1}
      VISION_OCR_API_KEY: ${VISION_OCR_API_KEY:-}
      # RFC-014 GraphRAG 抽取 LLM：用 host Mac 的 Ollama gemma4:e4b（容器 VM RAM 不夠，
      # host Mac 放得下）→ 經 host.docker.internal 連；地端、不受 Kimi 內容審查限制
      GRAPH_EXTRACT_MODEL: ${GRAPH_EXTRACT_MODEL:-gemma4:e4b}
      GRAPH_EXTRACT_BASE_URL: ${GRAPH_EXTRACT_BASE_URL:-http://host.docker.internal:11434/v1}
      GRAPH_EXTRACT_API_KEY: ${GRAPH_EXTRACT_API_KEY:-dummy}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    logging: *default-logging
    networks:
      - backend
      - frontend  # 需連外網呼叫 OpenAI Embedding API

  # Knowledge Celery Worker（背景文件處理）
  knowledge-worker:
    build:
      context: .
      dockerfile: services/knowledge/Dockerfile
    image: staffkm/knowledge:${TAG:-latest}
    container_name: staffkm-knowledge-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q knowledge
    environment:
      PORT: 8001
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-staffkm}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-staffkm_minio}
      MINIO_BUCKET: staffkm-docs
      MINIO_SECURE: "false"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # v5.9.23: OCR 引擎 (worker 也要解析檔案)
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      VISION_OCR_MODEL: ${VISION_OCR_MODEL:-llama3.2-vision}
      VISION_OCR_BASE_URL: ${VISION_OCR_BASE_URL:-http://embedder:11434/v1}
      VISION_OCR_API_KEY: ${VISION_OCR_API_KEY:-}
      # RFC-014 GraphRAG 抽取 LLM（worker 跑 build_graph）：用系統 LLM(Kimi)
      GRAPH_EXTRACT_MODEL: ${GRAPH_EXTRACT_MODEL:-gemma4:e4b}
      GRAPH_EXTRACT_BASE_URL: ${GRAPH_EXTRACT_BASE_URL:-http://host.docker.internal:11434/v1}
      GRAPH_EXTRACT_API_KEY: ${GRAPH_EXTRACT_API_KEY:-dummy}
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    logging: *default-logging
    networks:
      - backend
      - frontend  # Worker 需連外網呼叫 OpenAI / Cohere / 其他 AI API

  # ══════════════════════════════════════════════════════════════
  #  Agent Service（AI 代理人）
  # ══════════════════════════════════════════════════════════════

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    image: staffkm/agent:${TAG:-latest}
    container_name: staffkm-agent
    restart: unless-stopped
    # v3.6 P4: graceful shutdown — 等 in-flight workflow runs 收尾才強制終止
    stop_grace_period: 60s
    expose:
      - "8002"
    environment:
      PORT: 8002
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/2
      KNOWLEDGE_SERVICE_URL: http://knowledge:8001
      # P0-2 SSRF allowlist：workflow http_request / MCP 可呼叫的內部服務 host
      # （deny-by-default；私網 IP / metadata 仍擋，只放行這些明確的服務名）
      SSRF_ALLOWED_HOSTS: ${SSRF_ALLOWED_HOSTS:-knowledge,chat,auth,gateway,embedder,reranker,agent}
      # ── LLM 地端優先 (RFC-005) ─────────────────────
      LLM_PROVIDER:    ${LLM_PROVIDER:-ollama}
      LLM_MODEL:       ${LLM_MODEL:-gemma4:e4b}
      LLM_BASE_URL:    ${LLM_BASE_URL:-http://embedder:11434/v1}
      LLM_API_KEY:     ${LLM_API_KEY:-dummy}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS:  ${LLM_MAX_TOKENS:-2048}
      # ── 雲端選用 (留空則停用) ──────────────────────
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      # v5.2: Bailian (DashScope) — text-to-video / image-to-video node 走原生 API
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # legacy（v1 相容、後續移除）
      OPENAI_MODEL:    ${OPENAI_MODEL:-gemma4:e4b}
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-20}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # v3.4 P2: SMTP for quota_alert email channel
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@staffkm.local}
      SMTP_USE_TLS:  ${SMTP_USE_TLS:-true}
      # v3.7 P4: slow query threshold (ms); log + OTel span tag 觸發
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-500}
      # v4.0 P2: LEGACY_URL_MODE 已移除 (LegacyURLBridge 拔除)
      # v4.0 P3: worker backend 切換 — inprocess (預設、v3.x 行為) | arq
      WORKER_BACKEND: ${WORKER_BACKEND:-inprocess}
      # v4.0 P6: optional read replica DSN；空字串 = 用 DB_URL（單 pool）
      DB_READ_URL: ${DB_READ_URL:-}
      # v5.0 K: active-active multi-region（預設 disabled — 行為等同 v4.x）
      MULTI_REGION_ENABLED: ${MULTI_REGION_ENABLED:-false}
      REGION_ID: ${REGION_ID:-default}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
      knowledge:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
        reservations:
          memory: 256m
    logging: *default-logging
    networks:
      - backend
      - frontend  # v5.0.15: Agent 需連外網呼叫 OpenAI/Anthropic/Moonshot/DeepSeek/... API

  # ══════════════════════════════════════════════════════════════
  #  Agent Worker（v4.0 P3：arq distributed worker — opt-in）
  #  ── 啟用方式：在 .env 設 WORKER_BACKEND=arq，並 `docker compose
  #     --profile arq-worker up -d worker` 起這個 container。
  #  ── 同時必須 redeploy agent，讓 agent service 的 in-process loop 關掉
  #     （不然兩邊會 race 對 event_trigger_runs/approvals/webhook_outbox claim）。
  #  ── 用 staffkm/agent image 重跑（共用 codebase），entry 改成 arq。
  # ══════════════════════════════════════════════════════════════
  worker:
    image: staffkm/agent:${TAG:-latest}
    container_name: staffkm-worker
    profiles: ["arq-worker"]
    restart: unless-stopped
    command: ["python", "-m", "arq", "app.workers.arq_settings.WorkerSettings"]
    # v5.9.30: arq worker 沒 HTTP server → 覆寫 agent image 繼承的 curl :8002/health
    # （否則永遠 unhealthy）。改檢查能連到 redis broker 即視為存活
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('redis', 6379), timeout=3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/2
      KNOWLEDGE_SERVICE_URL: http://knowledge:8001
      # P0-2 SSRF allowlist（同 agent；觸發式 workflow 也在 worker 跑 executor）
      SSRF_ALLOWED_HOSTS: ${SSRF_ALLOWED_HOSTS:-knowledge,chat,auth,gateway,embedder,reranker,agent}
      # ── LLM（部分 job 會走 workflow 執行需要）─────────
      LLM_PROVIDER:    ${LLM_PROVIDER:-ollama}
      LLM_MODEL:       ${LLM_MODEL:-gemma4:e4b}
      LLM_BASE_URL:    ${LLM_BASE_URL:-http://embedder:11434/v1}
      LLM_API_KEY:     ${LLM_API_KEY:-dummy}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS:  ${LLM_MAX_TOKENS:-2048}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      # v5.2: Bailian (DashScope) — text-to-video / image-to-video node 走原生 API
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # ── SMTP（quota alert email channel）──────────────
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@staffkm.local}
      SMTP_USE_TLS:  ${SMTP_USE_TLS:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-500}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend
      - frontend  # v5.9.1: arq Worker 需連外網呼叫 LLM API (跟 agent 對齊)

  # ══════════════════════════════════════════════════════════════
  #  Auth Service（身分驗證 / LDAP）
  # ══════════════════════════════════════════════════════════════

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    image: staffkm/auth:${TAG:-latest}
    container_name: staffkm-auth
    restart: unless-stopped
    expose:
      - "8003"
    environment:
      PORT: 8003
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/3
      SECRET_KEY: ${SECRET_KEY}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_SERVER: ${LDAP_SERVER:-}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # v4.6 F: SMTP for email verify / forgot-password / trial welcome
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM:     ${SMTP_FROM:-noreply@staffkm.local}
      SMTP_USE_TLS:  ${SMTP_USE_TLS:-true}
      # v4.6 F: self-service OAuth (Google / GitHub)
      GOOGLE_OAUTH_CLIENT_ID:     ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CLIENT_ID:     ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      PUBLIC_WEB_BASE_URL:        ${PUBLIC_WEB_BASE_URL:-http://localhost}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend
      - frontend  # v5.9.1: verify provider 連線 (Moonshot/OpenAI/Anthropic 各家 /v1/models) + OAuth callback 需外網

  # ══════════════════════════════════════════════════════════════
  #  Integration Service（LINE / Teams）
  # ══════════════════════════════════════════════════════════════

  integration:
    build:
      context: .
      dockerfile: services/integration/Dockerfile
    image: staffkm/integration:${TAG:-latest}
    container_name: staffkm-integration
    restart: unless-stopped
    expose:
      - "8004"
    environment:
      PORT: 8004
      AGENT_SERVICE_URL: http://agent:8002
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      TEAMS_APP_ID: ${TEAMS_APP_ID:-}
      TEAMS_APP_PASSWORD: ${TEAMS_APP_PASSWORD:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
    depends_on:
      agent:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend
      - frontend  # v5.9.1: integration 需外網回覆 LINE/Teams webhook

  # ══════════════════════════════════════════════════════════════
  #  Chat Service（對話管理）
  # ══════════════════════════════════════════════════════════════

  chat:
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    image: staffkm/chat:${TAG:-latest}
    container_name: staffkm-chat
    restart: unless-stopped
    expose:
      - "8005"
    environment:
      PORT: 8005
      <<: [*db-env, *secrets-env]
      REDIS_URL: redis://:${REDIS_PASSWORD:-staffkm_redis}@redis:6379/5
      AGENT_SERVICE_URL: http://agent:8002
      MAX_CONTEXT_MESSAGES: ${MAX_CONTEXT_MESSAGES:-20}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      <<: *api-healthcheck
      test: ["CMD-SHELL", "curl -sf http://localhost:8005/health || exit 1"]
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
    logging: *default-logging
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  #  前端 UI（多階段建置 → Nginx 服務）
  # ══════════════════════════════════════════════════════════════

  ui:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # context = project root，因為 apps/web 依賴 packages/ts/{design-tokens,ui-kit}
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_TITLE: StaffKM 行政知識管理系統
    image: staffkm/ui:${TAG:-latest}
    container_name: staffkm-ui
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ | grep -q StaffKM || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging: *default-logging
    networks:
      - frontend

  # ══════════════════════════════════════════════════════════════
  #  Nginx 反向代理（對外唯一入口）
  # ══════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.27-alpine
    container_name: staffkm-nginx
    restart: unless-stopped
    labels:
      # 由 autoheal sidecar 監聽：unhealthy 達 3 次自動 restart
      - "autoheal=true"
    ports:
      - "0.0.0.0:${HTTP_PORT:-80}:80"
      - "0.0.0.0:${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/staffkm.conf:/etc/nginx/conf.d/staffkm.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    # End-to-end healthcheck：真正穿過 nginx → upstream（UI）。
    # 若 upstream IP 過時導致 502，healthcheck 會失敗 → autoheal 自動 restart nginx
    # （restart 等同重新 DNS 解析 upstream IP，等於修好 502）。
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=3 http://127.0.0.1/login | head -c 50 | grep -qi 'staffkm\\|<!doctype' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      gateway:
        condition: service_healthy
      ui:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging: *default-logging
    networks:
      - frontend

  # ══════════════════════════════════════════════════════════════
  #  可選：監控套件（profile=monitoring 才啟動）
  # ══════════════════════════════════════════════════════════════

  # ── v3.3 B1: OpenTelemetry Tracing backend ──────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: staffkm-tempo
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./infra/monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4318:4318"   # OTLP HTTP receiver
    logging: *default-logging
    networks:
      - backend

  # ── v3.3 B2: Log aggregation ─────────────────────────────────────
  loki:
    image: grafana/loki:3.3.1
    container_name: staffkm-loki
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./infra/monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    logging: *default-logging
    networks:
      - backend

  promtail:
    image: grafana/promtail:3.3.1
    container_name: staffkm-promtail
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ./infra/monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      - loki
    logging: *default-logging
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: staffkm-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    container_name: staffkm-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-staffkm_grafana}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_LOG_LEVEL: warn
      # v3.2 P3：給 postgres datasource provisioning 用（連 staffKM PG 抓 model_usage_logs）
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staffkm_secret}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 384m
    logging: *default-logging
    networks:
      - backend

  # ══════════════════════════════════════════════════════════════
  #  Marketing site — v4.2 Theme B
  #  純前端 SPA（Vue 3 + Vite），nginx 靜態服務 dist/。
  #  使用前需先在 host 跑 `cd apps/marketing && pnpm build`。
  #  prod 由 Caddy reverse proxy（v4.3 整合）。
  # ══════════════════════════════════════════════════════════════
  marketing:
    image: nginx:alpine
    container_name: staffkm-marketing
    restart: unless-stopped
    profiles: ["marketing"]
    volumes:
      - ../apps/marketing/dist:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    deploy:
      resources:
        limits:
          memory: 64m
    logging: *default-logging
    networks:
      - frontend

  # ══════════════════════════════════════════════════════════════
  #  Autoheal — 監聽 label="autoheal=true" 的容器，unhealthy 自動 restart
  #  解決「rebuild UI/agent 後 nginx upstream IP 過時 → 502」歷史共業
  # ══════════════════════════════════════════════════════════════
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: staffkm-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "10"      # 每 10s 掃描一次
      AUTOHEAL_START_PERIOD: "30"  # 啟動後 30s 內不動
      CURL_TIMEOUT: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frontend

# ──────────────────────────────────────────────────────────────
#  持久化 Volume
# ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    labels:
      staffkm.backup: "daily"
  redis_data:
    driver: local
  minio_data:
    driver: local
    labels:
      staffkm.backup: "daily"
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  loki_data:
    driver: local
  embedder_cache:
    driver: local
    labels:
      staffkm.backup: "weekly"   # HuggingFace 模型快取，重灌可重下載
  reranker_hf_cache:
    driver: local
    labels:
      staffkm.backup: "weekly"   # bge-reranker model cache（v3.4 P3）
  # v4.0 P5: PG replica volume（profile=multi-region 才用）
  postgres_replica_data:
    driver: local
  # v4.0 P7: MinIO secondary volume（profile=multi-region 才用）
  minio_secondary_data:
    driver: local

# ──────────────────────────────────────────────────────────────
#  網路 — 前後端隔離
# ──────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
    labels:
      staffkm.zone: "public"
  backend:
    driver: bridge
    internal: true
    labels:
      staffkm.zone: "private"
