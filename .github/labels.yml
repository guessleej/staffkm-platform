# GitHub labels — 用 `gh label create` 或 ghaction-github-labeler 自動同步
# 套用：gh label create --file .github/labels.yml

# ── 類型 ─────────────────────────
- name: "type:feature"
  color: "0e8a16"
  description: "新功能 / Story"
- name: "type:bug"
  color: "d73a4a"
  description: "缺陷"
- name: "type:tech-debt"
  color: "fbca04"
  description: "技術債 / 重構"
- name: "type:rfc"
  color: "5319e7"
  description: "設計提案"
- name: "type:docs"
  color: "0075ca"
  description: "文件"
- name: "type:chore"
  color: "ededed"
  description: "雜項 / 依賴"

