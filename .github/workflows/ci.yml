name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 偵測哪些 path 有改 → 決定跑哪些 job
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/**'
              - 'packages/python/**'
            frontend:
              - 'apps/web/**'
              - 'packages/ts/**'
              # Codex P1: 共用依賴解析檔也要觸發 frontend build
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ─────────────────────────────────────────────────────────────
  # 後端：Python 語法編譯檢查 + CLAUDE.md §8 asyncpg dialect lint
  # （repo 用 per-service requirements.txt，無 uv.lock / 統一 pyproject）
  # ─────────────────────────────────────────────────────────────
  # 後端品質：compile + ruff(高訊號) + pytest(雷區守衛 + 純邏輯單元)
  # 永遠跑 — 雷區守衛掃前後端，不依 path filter
  # ─────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile check (py_compile 全 services + packages)
        run: python -m compileall -q services packages/python || exit 1
      - name: Install lint/test deps
        # charset-normalizer：document_processor 編碼偵測直接依賴（Big5/CP950 fallback）
        run: pip install --quiet pytest==8.3.* ruff==0.8.* structlog==24.4.0 charset-normalizer==3.4.6
      - name: Lint (ruff 高訊號子集)
        run: ruff check .
      - name: Tests (雷區守衛 + 純邏輯單元)
        # knowledge 與 agent 各有 app/ package → 分開兩次 pytest 跑，避免 sys.modules 的 app 衝突
        run: |
          pytest tests/ services/knowledge/tests/test_document_processor.py services/knowledge/tests/test_search_fusion.py -q
          pytest services/agent/tests/test_workflow_conditions.py services/agent/tests/test_secrets.py services/agent/tests/test_crdt.py -q

  # ─────────────────────────────────────────────────────────────
  # 前端：placeholder lint + install + build（apps/web 真實 vite build）
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Codex P2: placeholder lint 檢查 apps/web/src，移到 frontend job 才會在
      # frontend-only PR 跑到（之前誤放在 backend job）
      - name: Placeholder view lint (CLAUDE.md release checklist)
        run: |
          if grep -rl "UnderConstructionView" apps/web/src/ 2>/dev/null; then
            echo "❌ 仍有 UnderConstructionView placeholder"; exit 1
          fi
          echo "✅ 無 placeholder view"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 不用 --frozen-lockfile：monorepo workspace lockfile 易漂移，CI 以「能 build」為準
      - run: pnpm install --no-frozen-lockfile
      - name: Build web
        run: cd apps/web && pnpm build
      # 對話渲染 last-mile 守衛（輕量 node，每 PR 跑）：SSE 換行→app 同款 marked
      # （breaks:true,gfm:true）→ 斷言結構化 DOM（<ol><li>），對照組（換行被吃）判為擠成一坨。
      # 真實瀏覽器 Playwright（apps/e2e/06-chat-render）仍在 playwright-e2e.yml（需 served app）。
      - name: Chat render guard (SSE 換行→marked→結構化 DOM)
        run: cd apps/web && node test/render-guard.mjs

  # ─────────────────────────────────────────────────────────────
  # 整合測試：service 層真 DB 測試（pgvector service container）+ coverage gate
  # 與輕量 backend job 分離（這層裝重依賴 sqlalchemy/asyncpg/passlib…）。只在 backend 改時跑。
  # 每個 service 一個 subdir + 各自一次 pytest invocation（agent/auth/knowledge 都有 app/
  # package，同 process 會撞名）。誠實 coverage gate：--cov 只算真有測的模組、不灌全 repo。
  # ─────────────────────────────────────────────────────────────
  integration:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: staffkm
          POSTGRES_PASSWORD: staffkm_secret
          POSTGRES_DB: staffkm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U staffkm -d staffkm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      STAFFKM_TEST_DB_URL: postgresql+asyncpg://staffkm:staffkm_secret@localhost:5432/staffkm_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install integration deps
        run: pip install --quiet -r tests/integration/requirements.txt
      # 每個模組各自一次 invocation（targeted --cov，誠實 per-module gate）。任一失敗即整步失敗。
      # 門檻按各模組「CI 可測天花板」誠實設定：
      #   quota 100%→90；auth 本地登入+token 全測、LDAP/AD 標 pragma→89%→85；
      #   workflow executor 1562 stmts、40+ node 多需外部 LLM/服務 → 本檔測 LLM-free 編排核心
      #   （走訪/路由/step 持久化/jsonb），coverage 僅 12%、gate 設 10 當「回歸 ratchet」非品質宣稱。
      - name: agent — quota/計帳 (app.core.usage)
        run: pytest tests/integration/agent/test_quota_integration.py --cov=app.core.usage --cov-report=term-missing --cov-fail-under=90 -q
      - name: agent — workflow executor 編排核心 (app.core.workflow.executor)
        run: pytest tests/integration/agent/test_workflow_executor_integration.py --cov=app.core.workflow.executor --cov-report=term-missing --cov-fail-under=10 -q
      # webhook outbox 投遞狀態機（at-least-once resilience）；_deliver/loop 走 httpx 需 live
      # endpoint、本檔不測 → 51%、gate 50 當 ratchet（狀態機 enqueue/claim/retry/DLQ 全測）。
      - name: agent — webhook outbox 投遞狀態機 (app.core.webhook_outbox)
        run: pytest tests/integration/agent/test_webhook_outbox_integration.py --cov=app.core.webhook_outbox --cov-report=term-missing --cov-fail-under=50 -q
      # idempotency 中介層去重（minimal Starlette app + 真 DB）；degrade/error 分支未測 → 76%、gate 70。
      - name: agent — idempotency 去重中介層 (app.middleware.idempotency)
        run: pytest tests/integration/agent/test_idempotency_integration.py --cov=app.middleware.idempotency --cov-report=term-missing --cov-fail-under=70 -q
      - name: auth — 登入/JWT (app.core.auth_service)
        run: pytest tests/integration/auth --cov=app.core.auth_service --cov-report=term-missing --cov-fail-under=85 -q
      - name: knowledge — hybrid 檢索 (app.core.vectorstore)
        # 真 pgvector：cosine 排序 / FTS CJK / RRF merge / 閾值 / KB 隔離 / SET LOCAL ivfflat.probes。100%→gate 90。
        run: pytest tests/integration/knowledge --cov=app.core.vectorstore --cov-report=term-missing --cov-fail-under=90 -q

  # ─────────────────────────────────────────────────────────────
  # 安全掃描 — 只跑 secret scanning（非阻斷，PR only）
  # ─────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true   # 安全掃描僅提示，不擋 merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 必要 gate：backend + frontend + integration（security 非阻斷）
  # ─────────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [backend, frontend, integration]
    runs-on: ubuntu-latest
    steps:
      - run: |
          # skipped (path 沒改) 視為通過；只有 failure 才擋
          if [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.frontend.result }}" == "failure" ] || \
             [ "${{ needs.integration.result }}" == "failure" ]; then
            echo "❌ CI failed"; exit 1
          fi
          echo "✅ CI passed"
