name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 偵測哪些 path 有改 → 決定跑哪些 job
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/**'
              - 'packages/python/**'
            frontend:
              - 'apps/web/**'
              - 'packages/ts/**'
              # Codex P1: 共用依賴解析檔也要觸發 frontend build
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ─────────────────────────────────────────────────────────────
  # 後端：Python 語法編譯檢查 + CLAUDE.md §8 asyncpg dialect lint
  # （repo 用 per-service requirements.txt，無 uv.lock / 統一 pyproject）
  # ─────────────────────────────────────────────────────────────
  # 後端品質：compile + ruff(高訊號) + pytest(雷區守衛 + 純邏輯單元)
  # 永遠跑 — 雷區守衛掃前後端，不依 path filter
  # ─────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile check (py_compile 全 services + packages)
        run: python -m compileall -q services packages/python || exit 1
      - name: Install lint/test deps
        run: pip install --quiet pytest==8.3.* ruff==0.8.* structlog==24.4.0
      - name: Lint (ruff 高訊號子集)
        run: ruff check .
      - name: Tests (雷區守衛 + 純邏輯單元)
        run: pytest tests/ services/knowledge/tests/test_document_processor.py -q

  # ─────────────────────────────────────────────────────────────
  # 前端：placeholder lint + install + build（apps/web 真實 vite build）
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Codex P2: placeholder lint 檢查 apps/web/src，移到 frontend job 才會在
      # frontend-only PR 跑到（之前誤放在 backend job）
      - name: Placeholder view lint (CLAUDE.md release checklist)
        run: |
          if grep -rl "UnderConstructionView" apps/web/src/ 2>/dev/null; then
            echo "❌ 仍有 UnderConstructionView placeholder"; exit 1
          fi
          echo "✅ 無 placeholder view"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 不用 --frozen-lockfile：monorepo workspace lockfile 易漂移，CI 以「能 build」為準
      - run: pnpm install --no-frozen-lockfile
      - name: Build web
        run: cd apps/web && pnpm build

  # ─────────────────────────────────────────────────────────────
  # 安全掃描 — 只跑 secret scanning（非阻斷，PR only）
  # ─────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true   # 安全掃描僅提示，不擋 merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 必要 gate：只看 backend + frontend（security 非阻斷）
  # ─────────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: |
          # skipped (path 沒改) 視為通過；只有 failure 才擋
          if [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.frontend.result }}" == "failure" ]; then
            echo "❌ CI failed"; exit 1
          fi
          echo "✅ CI passed"
