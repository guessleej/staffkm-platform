name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 偵測哪些 path 有改 → 決定跑哪些 job
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'services/**'
              - 'packages/python/**'
            frontend:
              - 'apps/web/**'
              - 'packages/ts/**'

  # ─────────────────────────────────────────────────────────────
  # 後端：Python 語法編譯檢查 + CLAUDE.md §8 asyncpg dialect lint
  # （repo 用 per-service requirements.txt，無 uv.lock / 統一 pyproject）
  # ─────────────────────────────────────────────────────────────
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile check (py_compile 全 services + packages)
        run: |
          python -m compileall -q services packages/python || exit 1
      - name: asyncpg dialect lint (CLAUDE.md §8)
        run: |
          set -e
          echo "▶ 掃 :param::type（asyncpg 不認，應改 CAST）"
          HITS=$(grep -rnE ':[a-z_]+::(jsonb|vector|uuid|int|text|timestamptz|date|inet|bool)' \
            services/ packages/python/ --include="*.py" 2>/dev/null \
            | grep -v __pycache__ | grep -v "/alembic/versions/" \
            | grep -v "CLAUDE.md\|# " || true)
          if [ -n "$HITS" ]; then
            echo "❌ 發現 :param::type 用法（請改 CAST(:param AS type)）："
            echo "$HITS"; exit 1
          fi
          echo "✅ 無 :param::type 殘留"
      - name: Placeholder view lint (CLAUDE.md release checklist)
        run: |
          if grep -rl "UnderConstructionView" apps/web/src/ 2>/dev/null; then
            echo "❌ 仍有 UnderConstructionView placeholder"; exit 1
          fi
          echo "✅ 無 placeholder view"

  # ─────────────────────────────────────────────────────────────
  # 前端：install + build（apps/web 真實 vite build）
  # ─────────────────────────────────────────────────────────────
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 不用 --frozen-lockfile：monorepo workspace lockfile 易漂移，CI 以「能 build」為準
      - run: pnpm install --no-frozen-lockfile
      - name: Build web
        run: cd apps/web && pnpm build

  # ─────────────────────────────────────────────────────────────
  # 安全掃描 — 只跑 secret scanning（非阻斷，PR only）
  # ─────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true   # 安全掃描僅提示，不擋 merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 必要 gate：只看 backend + frontend（security 非阻斷）
  # ─────────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: |
          # skipped (path 沒改) 視為通過；只有 failure 才擋
          if [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.frontend.result }}" == "failure" ]; then
            echo "❌ CI failed"; exit 1
          fi
          echo "✅ CI passed"
