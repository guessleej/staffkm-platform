[project]
name = "staffkm-sdk"
version = "0.2.0"
description = "Python SDK for staffKM platform (v4.5 — Theme E)"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["staffkm_sdk", "staffkm"]
