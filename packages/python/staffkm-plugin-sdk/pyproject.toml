[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "staffkm-plugin-sdk"
version = "0.1.0"
description = "Plugin SDK for staffKM platform (v4.3)"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "structlog>=24.0",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
include = ["staffkm_plugin_sdk*"]
