[project]
name = "staffkm-tenant"
version = "0.1.0"
description = "Multi-tenant workspace + RBAC/ABAC for staffKM"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "sqlalchemy>=2.0",
    "pydantic>=2.9",
    "structlog>=24.4",
    "staffkm-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["staffkm_tenant"]
