server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 靜態資源強快取
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # favicon & manifest 短快取
    location ~* \.(ico|webmanifest|png|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Vue Router — 所有路徑回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
